apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-app
  namespace: platform-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-app
  template:
    metadata:
      labels:
        app: platform-app
    spec:
      containers:
        - name: platform-app
          image: platform-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000